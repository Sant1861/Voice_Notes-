<!DOCTYPE html>
<html>
<head>
  <title>Voice Notes App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 420px;
      text-align: center;
    }

    h2 {
      color: #333;
    }

    button {
      padding: 10px 18px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .start {
      background: #28a745;
      color: white;
    }

    .stop {
      background: #dc3545;
      color: white;
    }

    button:hover {
      opacity: 0.85;
    }

    textarea {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      min-height: 100px;
      width: 100%;
      background: #fafafa;
      resize: none;
      font-size: 14px;
    }

    .wallet {
      margin-top: 20px;
      font-weight: bold;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🎤 Voice Notes App</h2>

  <button class="start" onclick="startRecording()">Start Recording</button>
  <button class="stop" onclick="stopRecording()">Stop</button>

  <!-- ✅ Editable Text Area -->
  <textarea id="output" placeholder="Your text will appear here..."></textarea>

  <div class="wallet">💰 Wallet Balance: ₹100</div>

  <div class="status" id="status">Status: Idle</div>
</div>

<script>
let recognition;
let finalText = "";

// 🎙 START RECORDING
function startRecording() {

  // ✅ Clear old text
  finalText = "";
  document.getElementById("output").value = "";

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  document.getElementById("status").innerText = "Status: Listening...";

  recognition.onresult = function(event) {
    let interimText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      let transcript = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalText += transcript + " ";
      } else {
        interimText += transcript;
      }
    }

    document.getElementById("output").value =
      finalText + interimText;
  };

  recognition.onend = function() {
    recognition.start();
  };

  recognition.start();
}

// 🛑 STOP RECORDING
function stopRecording() {
  if (recognition) {
    recognition.onend = null;
    recognition.stop();
    document.getElementById("status").innerText = "Status: Stopped";
  }
}
</script>

</body>
</html>
