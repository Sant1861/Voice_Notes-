<!DOCTYPE html>
<html>
<head>
  <title>Voice Notes App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 10px;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h2 {
      color: #333;
      font-size: 22px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      min-width: 120px;
    }

    .start {
      background: #28a745;
      color: white;
    }

    .stop {
      background: #dc3545;
      color: white;
    }

    button:hover {
      opacity: 0.85;
    }

    textarea {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      min-height: 100px;
      width: 100%;
      background: #fafafa;
      resize: none;
      font-size: 14px;
    }

    .wallet {
      margin-top: 15px;
      font-weight: bold;
      font-size: 15px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: gray;
    }

    /* 🔥 MOBILE (max 480px) */
    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }

      h2 {
        font-size: 18px;
      }

      button {
        width: 100%;
        font-size: 13px;
      }

      textarea {
        font-size: 13px;
        min-height: 90px;
      }
    }

    /* 🔥 TABLET (481px - 768px) */
    @media (max-width: 768px) {
      .container {
        max-width: 90%;
      }

      textarea {
        min-height: 110px;
      }
    }

    /* 🔥 LARGE SCREENS */
    @media (min-width: 1024px) {
      .container {
        max-width: 450px;
      }

      h2 {
        font-size: 24px;
      }
    }

  </style>
</head>

<body>

<div class="container">
  <h2>🎤 Voice Notes App</h2>

  <div class="btn-group">
    <button class="start" onclick="startRecording()">Start Recording</button>
    <button class="stop" onclick="stopRecording()">Stop</button>
  </div>

  <textarea id="output" placeholder="Your text will appear here..."></textarea>

  <div class="wallet">💰 Wallet Balance: ₹100</div>

  <div class="status" id="status">Status: Idle</div>
</div>

<script>
let recognition;
let finalText = "";

function startRecording() {
  finalText = "";
  document.getElementById("output").value = "";

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  document.getElementById("status").innerText = "Status: Listening...";

  recognition.onresult = function(event) {
    let interimText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      let transcript = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalText += transcript + " ";
      } else {
        interimText += transcript;
      }
    }

    document.getElementById("output").value = finalText + interimText;
  };

  recognition.onend = function() {
    recognition.start();
  };

  recognition.start();
}

function stopRecording() {
  if (recognition) {
    recognition.onend = null;
    recognition.stop();
    document.getElementById("status").innerText = "Status: Stopped";
  }
}
</script>

</body>
</html>
